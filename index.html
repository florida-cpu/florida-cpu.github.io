<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Muscle for Hire Movers — Mover Page</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Inter',sans-serif;background:#f4f6f9;color:#1a1a2e;min-height:100vh;padding:20px;}
  .header{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
  .header-icon{font-size:36px;}
  .header-title{font-weight:700;font-size:1.3rem;}
  .card{background:#fff;border-radius:16px;padding:24px;margin-bottom:20px;box-shadow:0 4px 8px rgba(0,0,0,0.05);}
  .card label{display:block;margin-bottom:6px;font-weight:600;}
  .card input, .card select{width:100%;padding:10px;margin-bottom:12px;border-radius:8px;border:1px solid #e0e0e0;font-size:15px;}
  .total-row{font-weight:700;font-size:1.2rem;margin-top:10px;text-align:right;}
  .btn{padding:14px;border:none;border-radius:12px;background:#1a2b5e;color:#fff;font-weight:700;font-size:16px;cursor:pointer;width:100%;margin-top:10px;}
  .qr-container{text-align:center;margin-top:20px;}
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">&#x1F4AA;</div>
  <div class="header-title">Muscle for Hire Movers</div>
</div>

<div class="card">
  <label for="numMovers">Number of movers:</label>
  <input type="number" id="numMovers" value="1" min="1" step="1">

  <label for="hours">Hours worked:</label>
  <input type="number" id="hours" value="1" min="0.25" step="0.25">

  <label for="travelFee">Travel fee ($):</label>
  <input type="number" id="travelFee" value="0" min="0" step="0.01">

  <label for="promoValue">Promo (enter number):</label>
  <input type="number" id="promoValue" value="0" min="0" step="0.01">

  <label for="promoType">Promo type:</label>
  <select id="promoType">
    <option value="flat">Flat $ off</option>
    <option value="percent">% off</option>
  </select>

  <div class="total-row">Subtotal: $<span id="subtotalDisplay">0.00</span></div>

  <button class="btn" onclick="generateTipLink()">Generate QR / Link</button>
</div>

<div class="qr-container">
  <canvas id="qrcode"></canvas>
  <div><a href="#" id="tipLink" target="_blank"></a></div>
</div>

<script>
const PRICE_PER_HOUR = 50;

function updateSubtotal() {
  const movers = parseFloat(document.getElementById('numMovers').value) || 0;
  const hours = parseFloat(document.getElementById('hours').value) || 0;
  const travelFee = parseFloat(document.getElementById('travelFee').value) || 0;
  let subtotal = movers * hours * PRICE_PER_HOUR + travelFee;

  const promoValue = parseFloat(document.getElementById('promoValue').value) || 0;
  const promoType = document.getElementById('promoType').value;

  if (promoValue > 0) {
    if (promoType === 'percent') subtotal = subtotal * (1 - promoValue / 100);
    else subtotal = subtotal - promoValue;
  }
  return subtotal.toFixed(2);
}

function generateTipLink() {
  const subtotal = updateSubtotal();
  document.getElementById('subtotalDisplay').textContent = subtotal;

  const tipPage = `https://florida-cpu.github.io/tip.html?subtotal=${subtotal}`;
  document.getElementById('tipLink').href = tipPage;
  document.getElementById('tipLink').textContent = "Go to tip page";

  // Generate QR code
  QRCode.toCanvas(document.getElementById('qrcode'), tipPage, function (error) {
    if (error) console.error(error);
  });
}

// Update subtotal on input change
['numMovers','hours','travelFee','promoValue','promoType'].forEach(id => {
  document.getElementById(id).addEventListener('input', ()=>{
    document.getElementById('subtotalDisplay').textContent = updateSubtotal();
  });
});
</script>

</body>
</html>
