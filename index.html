<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Muscle for Hire Movers — Mover Page</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
<style>
body{font-family:'Inter',sans-serif;background:#f4f6f9;color:#1a1a2e;display:flex;flex-direction:column;align-items:center;padding:20px;}
.header{width:100%;background:#1a2b5e;padding:15px;text-align:center;color:white;border-radius:10px;margin-bottom:20px;}
.header h1{margin:0;font-size:1.5rem;}
.container{width:100%;max-width:420px;background:#fff;padding:20px;border-radius:16px;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
label{display:block;margin-top:12px;font-weight:600;}
input, select{width:100%;padding:10px;margin-top:5px;border-radius:10px;border:1px solid #e8ecf4;font-size:15px;}
button{margin-top:15px;width:100%;padding:14px;background:#1a2b5e;color:white;font-weight:700;border:none;border-radius:12px;font-size:16px;cursor:pointer;}
.total-row{margin-top:15px;font-weight:700;font-size:18px;text-align:right;}
.qrcode{margin-top:20px;text-align:center;}
</style>
</head>
<body>

<div class="header">
  <h1>Muscle for Hire Movers</h1>
</div>

<div class="container">
  <label>Number of Movers</label>
  <input type="number" id="numMovers" min="1" value="1">

  <label>Hours Worked (increments of 0.25)</label>
  <input type="number" id="hoursWorked" step="0.25" min="0.25" value="1">

  <label>Travel Fee ($)</label>
  <input type="number" id="travelFee" min="0" value="0">

  <label>Promo Code (flat $ or %)</label>
  <input type="text" id="promoCode" placeholder="e.g., 5 or 5%">

  <div class="total-row">Subtotal: $<span id="subtotal">0.00</span></div>

  <button onclick="generateLink()">Generate Tip Link & QR</button>

  <div class="qrcode">
    <canvas id="qr"></canvas>
    <p><a href="#" id="tipLink" target="_blank">Or open tip page</a></p>
  </div>
</div>

<script>
const RATE = 50; // $50 per hour per mover

function calculateSubtotal() {
  const movers = parseFloat(document.getElementById('numMovers').value) || 0;
  const hours = parseFloat(document.getElementById('hoursWorked').value) || 0;
  let subtotal = movers * hours * RATE;
  
  const travel = parseFloat(document.getElementById('travelFee').value) || 0;
  subtotal += travel;

  const promoInput = document.getElementById('promoCode').value.trim();
  if(promoInput){
    if(promoInput.endsWith('%')){
      let pct = parseFloat(promoInput.slice(0,-1));
      subtotal -= subtotal * (pct/100);
    } else {
      subtotal -= parseFloat(promoInput);
    }
  }

  if(subtotal<0) subtotal=0;
  return subtotal.toFixed(2);
}

function generateLink(){
  const subtotal = calculateSubtotal();
  document.getElementById('subtotal').innerText = subtotal;

  // Create tip page URL with subtotal parameter
  const tipUrl = `${window.location.origin}/tip.html?subtotal=${subtotal}`;
  document.getElementById('tipLink').href = tipUrl;
  document.getElementById('tipLink').innerText = tipUrl;

  // Generate QR code
  const qr = new QRious({
    element: document.getElementById('qr'),
    value: tipUrl,
    size: 180
  });
}

// Update subtotal live when inputs change
document.querySelectorAll('#numMovers, #hoursWorked, #travelFee, #promoCode').forEach(el=>{
  el.addEventListener('input', ()=> {
    document.getElementById('subtotal').innerText = calculateSubtotal();
  });
});
</script>

</body>
</html>
