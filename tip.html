<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Muscle for Hire Movers — Tip Page</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Inter',sans-serif;background:#f4f6f9;color:#1a1a2e;display:flex;flex-direction:column;align-items:center;padding:20px;}
  .header{width:100%;background:#1a2b5e;padding:20px;display:flex;justify-content:center;align-items:center;gap:10px;margin-bottom:30px;}
  .header-title{color:#fff;font-weight:700;font-size:1.3rem;}
  .container{width:100%;max-width:480px;display:flex;flex-direction:column;gap:16px;}
  .card{background:#fff;border-radius:16px;padding:24px;border:1px solid #e8ecf4;}
  button{width:100%;padding:14px;border:none;border-radius:12px;background:#1a2b5e;color:#fff;font-weight:700;font-size:16px;cursor:pointer;margin-bottom:8px;}
  .total-display{font-size:22px;font-weight:700;margin-bottom:10px;text-align:right;}
</style>
</head>
<body>

<div class="header">
  <div class="header-title">Muscle for Hire Movers — Tip Page</div>
</div>

<div class="container">
  <div class="card">
    <div>Subtotal: $<span id="subtotalDisplay">0.00</span></div>
    <div class="total-display">Total: $<span id="totalDisplay">0.00</span></div>

    <button onclick="selectTip(20)">Tip 20%</button>
    <button onclick="selectTip(25)">Tip 25%</button>
    <button onclick="selectTip(30)">Tip 30%</button>
    <button onclick="selectTip(0)">No Tip</button>
    <input type="number" id="customTip" placeholder="Custom Tip $" step="0.01" style="width:100%;padding:10px;border-radius:8px;border:1.5px solid #e8ecf4;margin-bottom:12px;">
    <button onclick="selectTip('custom')">Apply Custom Tip</button>

    <a id="stripeBtn" href="#" target="_blank">
      <button>Pay with Stripe</button>
    </a>
  </div>
</div>

<script>
function getQueryParam(param) {
  return new URLSearchParams(window.location.search).get(param);
}

let subtotal = parseFloat(getQueryParam('subtotal')) || 0;
let tipAmount = 0;

function updateDisplay() {
  document.getElementById('subtotalDisplay').textContent = subtotal.toFixed(2);
  document.getElementById('totalDisplay').textContent = (subtotal + tipAmount).toFixed(2);
  
  // Stripe link (replace with your real Stripe test/live link)
  let cents = Math.round((subtotal + tipAmount) * 100);
  let stripeLink = `https://buy.stripe.com/test_6oEbLh7Qs9s2aCw6oo?amount=${cents}`;
  document.getElementById('stripeBtn').href = stripeLink;
}

function selectTip(value) {
  if(value === 'custom'){
    tipAmount = parseFloat(document.getElementById('customTip').value) || 0;
  } else {
    tipAmount = subtotal * value/100;
  }
  updateDisplay();
}

// initialize
updateDisplay();
</script>

</body>
</html>
