<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Muscle for Hire Movers — Tip Page</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
body{font-family:'Inter',sans-serif;background:#f4f6f9;color:#1a1a2e;display:flex;flex-direction:column;align-items:center;padding:20px;}
.header{width:100%;background:#1a2b5e;padding:15px;text-align:center;color:white;border-radius:10px;margin-bottom:20px;}
.header h1{margin:0;font-size:1.5rem;}
.container{width:100%;max-width:420px;background:#fff;padding:20px;border-radius:16px;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
.tip-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;}
.tip-btn{padding:14px;border-radius:12px;border:1px solid #e8ecf4;background:#f4f6f9;cursor:pointer;text-align:center;font-weight:700;}
.tip-btn.active{background:#1a2b5e;color:white;border-color:#1a2b5e;}
input{width:100%;padding:10px;border-radius:10px;border:1.5px solid #e8ecf4;margin-top:10px;}
button{margin-top:15px;width:100%;padding:14px;background:#1a2b5e;color:white;font-weight:700;border:none;border-radius:12px;font-size:16px;cursor:pointer;}
.total-row{margin-top:15px;font-weight:700;font-size:18px;text-align:right;}
</style>
</head>
<body>

<div class="header">
  <h1>Muscle for Hire Movers</h1>
  <p style="font-size:0.9rem;color:#b0bbd4;">Secure Payment</p>
</div>

<div class="container">
  <p>Subtotal: $<span id="subtotalDisplay">0.00</span></p>

  <div class="tip-grid">
    <div class="tip-btn" data-tip="20">20%</div>
    <div class="tip-btn" data-tip="25">25%</div>
    <div class="tip-btn" data-tip="30">30%</div>
    <div class="tip-btn" data-tip="0">No Tip</div>
  </div>

  <input type="number" id="customTip" placeholder="Custom Tip ($)" min="0">

  <div class="total-row">Total: $<span id="totalDisplay">0.00</span></div>

  <button id="payBtn">Pay with Stripe</button>
</div>

<script>
const params = new URLSearchParams(window.location.search);
let subtotal = parseFloat(params.get('subtotal')) || 0;
document.getElementById('subtotalDisplay').innerText = subtotal.toFixed(2);

let tip = 0;
const totalDisplay = document.getElementById('totalDisplay');
const tipButtons = document.querySelectorAll('.tip-btn');
const customTip = document.getElementById('customTip');

function updateTotal(){
  const total = subtotal + tip;
  totalDisplay.innerText = total.toFixed(2);
}

tipButtons.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tipButtons.forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    tip = parseFloat(btn.dataset.tip);
    if(tip>0 && tip<100) tip = subtotal * (tip/100);
    customTip.value = '';
    updateTotal();
  });
});

customTip.addEventListener('input', ()=>{
  tipButtons.forEach(b=>b.classList.remove('active'));
  tip = parseFloat(customTip.value) || 0;
  updateTotal();
});

updateTotal();

// Stripe Payment Link with custom amount
document.getElementById('payBtn').addEventListener('click', ()=>{
  const totalCents = Math.round((subtotal+tip)*100);
  const stripeLink = `https://buy.stripe.com/test_custom_amount_here?amount=${totalCents}`;
  window.open(stripeLink,'_blank');
});
</script>

</body>
</html>
