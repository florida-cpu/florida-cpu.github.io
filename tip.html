<script>
const params = new URLSearchParams(window.location.search);
let subtotal = parseFloat(params.get('subtotal')) || 0;
let tip = 0;

document.getElementById('subtotalDisplay').innerText = subtotal.toFixed(2);

function updateTotal() {
  const total = subtotal + tip;
  document.getElementById('totalDisplay').innerText = total.toFixed(2);
}

function selectTip(pct) {
  tip = subtotal * (pct / 100);
  updateTotal();
}

document.getElementById('customTip').addEventListener('input', () => {
  tip = parseFloat(document.getElementById('customTip').value) || 0;
  updateTotal();
});

updateTotal();

document.getElementById('payBtn').addEventListener('click', async () => {
  const total = subtotal + tip;
  const cents = Math.round(total * 100);

  console.log("Sending to Make:", cents);

  const res = await fetch('YOUR_REAL_WEBHOOK_URL_HERE', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ total: cents })
  });

  const data = await res.json();
  console.log("Response:", data);

  if (data.url) {
    window.location.href = data.url;
  } else {
    alert('Payment failed');
  }
});
</script>
