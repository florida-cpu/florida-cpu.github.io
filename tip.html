<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Muscle For Hire Movers — Tip Page</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #f4f6f9;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 0 3rem;
    }

    /* HEADER */
    .header {
      width: 100%;
      background: #1a2b5e;
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      margin-bottom: 1.75rem;
    }
    .header-icon {
      width: 40px; height: 40px;
      background: #fff;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .header-text { color: #fff; }
    .header-title { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.01em; }
    .header-sub { font-size: 0.72rem; color: #8fa3d4; letter-spacing: 0.05em; text-transform: uppercase; }

    .outer {
      width: 100%;
      max-width: 480px;
      padding: 0 1rem;
    }

    /* CARD */
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 1.5rem;
      border: 1px solid #e8ecf4;
      margin-bottom: 1rem;
    }

    .section-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: #1a2b5e;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    /* TIP GRID */
    .tip-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .tip-btn {
      background: #f4f6f9;
      border: 1.5px solid #e8ecf4;
      border-radius: 12px;
      font-weight: 600;
      padding: 1rem 0;
      text-align: center;
      cursor: pointer;
      transition: all 0.15s;
    }
    .tip-btn:hover { background: #1a2b5e; color: #fff; border-color: #1a2b5e; }
    .tip-btn.active { background: #1a2b5e; color: #fff; border-color: #1a2b5e; }

    .tip-btn .pct { font-size: 1.25rem; display: block; }
    .tip-btn .amt { font-size: 0.85rem; color: #6b7a99; margin-top: 0.25rem; }
    .tip-btn.active .amt { color: #fff; }

    /* CUSTOM TIP */
    .custom-row {
      display: none;
      margin-bottom: 1rem;
      gap: 0.5rem;
      align-items: center;
    }
    .custom-row.visible { display: flex; }
    .custom-row span { font-weight: 600; font-size: 1rem; }
    .custom-row input {
      flex: 1;
      padding: 0.85rem 1rem;
      font-size: 0.95rem;
      border-radius: 10px;
      border: 1.5px solid #e8ecf4;
      outline: none;
      background: #fff;
    }
    .custom-row input:focus { border-color: #1a2b5e; }

    /* TOTAL DISPLAY */
    .total-display {
      background: #f4f6f9;
      border: 1px solid #e8ecf4;
      border-radius: 12px;
      padding: 1rem 1.1rem;
      margin-bottom: 1rem;
    }
    .total-row { display: flex; justify-content: space-between; padding: 0.5rem 0; }
    .total-row.final { border-top: 2px solid #1a2b5e; margin-top: 0.5rem; padding-top: 0.5rem; }
    .total-row .lbl { color: #6b7a99; font-weight: 600; }
    .total-row.final .lbl { color: #1a1a2e; font-size: 1rem; font-weight: 700; }
    .total-row .val { font-weight: 600; }
    .total-row.final .val { color: #1a2b5e; font-size: 1.5rem; font-weight: 700; }

    /* PAY BUTTON */
    .btn-pay {
      width: 100%;
      padding: 1rem;
      background: #1a2b5e;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-pay:hover { background: #253f8a; transform: scale(0.98); }
    .btn-pay:disabled { opacity: 0.5; cursor: not-allowed; }

    /* STATUS MESSAGE */
    .status-msg {
      display: none;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      font-size: 0.85rem;
      margin-top: 0.75rem;
    }
    .status-msg.error { display: block; background: #fdd; color: #c0392b; border: 1px solid #c0392b; }
    .status-msg.info { display: block; background: #f0e6d6; color: #f5a623; border: 1px solid #f5a623; }

    /* MISSING SUBTOTAL */
    .missing-state {
      text-align: center;
      padding: 3rem 1rem;
    }
    .missing-state h2 { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.5rem; }
    .missing-state p { font-size: 0.9rem; color: #6b7a99; line-height: 1.5; margin-bottom: 1rem; }
    .missing-state a {
      padding: 0.75rem 1.5rem;
      background: #1a2b5e;
      color: #fff;
      border-radius: 12px;
      font-weight: 700;
      text-decoration: none;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-icon">💪</div>
    <div class="header-text">
      <div class="header-title">Muscle For Hire Movers</div>
      <div class="header-sub">Tip Page</div>
    </div>
  </div>

  <div class="outer">
    <!-- MISSING STATE -->
    <div class="missing-state" id="missing-state" style="display:none;">
      <h2>No Subtotal Found</h2>
      <p>This page requires a subtotal in the URL.<br/>Please go back to the calculator and generate a fresh tip link.</p>
      <a href="index.html">← Back to Calculator</a>
    </div>

    <!-- TIP UI -->
    <div id="tip-ui" class="card">
      <p class="section-label">Your Move Total</p>
      <div class="total-row final">
        <span class="lbl">Subtotal</span>
        <span class="val" id="total-subtotal">$0.00</span>
      </div>

      <p class="section-label">Choose a Tip</p>
      <div class="tip-grid">
        <button class="tip-btn" data-pct="20" onclick="selectTip(20)">
          <span class="pct">20%</span>
          <span class="amt" id="amt-20">$0.00</span>
        </button>
        <button class="tip-btn" data-pct="25" onclick="selectTip(25)">
          <span class="pct">25%</span>
          <span class="amt" id="amt-25">$0.00</span>
        </button>
        <button class="tip-btn" data-pct="30" onclick="selectTip(30)">
          <span class="pct">30%</span>
          <span class="amt" id="amt-30">$0.00</span>
        </button>
      </div>

      <div class="tip-grid">
        <button class="tip-btn" data-pct="0" onclick="selectTip(0)">
          <span class="pct">No Tip</span>
          <span class="amt">$0.00</span>
        </button>
        <button class="tip-btn" data-pct="custom" onclick="selectCustom()">
          <span class="pct">Custom</span>
          <span class="amt">Enter Amount</span>
        </button>
      </div>

      <div class="custom-row" id="custom-row">
        <span>$</span>
        <input type="number" id="custom-input" placeholder="0.00" min="0" step="0.01" oninput="updateCustom()" />
      </div>

      <div class="total-display">
        <div class="total-row">
          <span class="lbl" id="tip-label">Tip (0%)</span>
          <span class="val" id="tip-amount">$0.00</span>
        </div>
        <div class="total-row final">
          <span class="lbl">Total Due</span>
          <span class="val" id="final-total">$0.00</span>
        </div>
      </div>

      <button class="btn-pay" id="pay-btn" onclick="handlePay()">💳 Pay Now</button>
      <div class="status-msg" id="status-msg"></div>
    </div>
  </div>

  <script>
    const MAKE_WEBHOOK_URL = 'https://hook.us2.make.com/biwwpm5olme1grp5zauee0wcw5yx4ziv';
    let subtotal = 0, tipAmount = 0, tipMode = 'pct', selectedPct = 20;

    (function init() {
      const params = new URLSearchParams(window.location.search);
      const raw = params.get('subtotal');
      if (!raw || isNaN(parseFloat(raw))) {
        document.getElementById('tip-ui').style.display = 'none';
        document.getElementById('missing-state').style.display = 'block';
        return;
      }
      subtotal = Math.max(0, parseFloat(raw));
      document.getElementById('total-subtotal').textContent = '$' + subtotal.toFixed(2);
      [20,25,30].forEach(p => {
        document.getElementById(`amt-${p}`).textContent = '$' + (subtotal * p / 100).toFixed(2);
      });
      selectTip(20);
    })();

    function selectTip(pct){
      tipMode = pct===0?'none':'pct'; selectedPct = pct;
      tipAmount = pct===0?0:subtotal*pct/100;
      document.querySelectorAll('.tip-btn').forEach(btn => btn.classList.toggle('active', btn.getAttribute('data-pct')==pct));
      document.getElementById('custom-row').classList.remove('visible');
      document.getElementById('custom-input').value='';
      updateTotals();
    }

    function selectCustom(){
      tipMode='custom'; tipAmount=0;
      document.querySelectorAll('.tip-btn').forEach(btn => btn.classList.toggle('active', btn.getAttribute('data-pct')==='custom'));
      document.getElementById('custom-row').classList.add('visible');
      document.getElementById('custom-input').focus();
      updateTotals();
    }

    function updateCustom(){
      const v=parseFloat(document.getElementById('custom-input').value);
      tipAmount = isNaN(v)?0:Math.max(0,v);
      updateTotals();
    }

    function updateTotals(){
      const total=subtotal+tipAmount;
      let tipLabel='Tip';
      if(tipMode==='pct' && selectedPct>0) tipLabel=`Tip (${selectedPct}%)`;
      else if(tipMode==='none') tipLabel='No tip';
      else if(tipMode==='custom') tipLabel='Custom tip';
      document.getElementById('tip-label').textContent=tipLabel;
      document.getElementById('tip-amount').textContent='$'+tipAmount.toFixed(2);
      document.getElementById('final-total').textContent='$'+total.toFixed(2);
    }

    async function handlePay(){
      const total=subtotal+tipAmount;
      const totalCents=Math.round(total*100);
      if(totalCents<50){ showStatus('Minimum $0.50 required','error'); return; }
      setLoading(true); hideStatus();
      try{
        const res=await fetch(MAKE_WEBHOOK_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
          amount_cents: totalCents,
          subtotal_cents: Math.round(subtotal*100),
          tip_cents: Math.round(tipAmount*100),
          subtotal: subtotal.toFixed(2),
          tip: tipAmount.toFixed(2),
          total: total.toFixed(2),
          currency:'usd',
          description:`Moving service — $${subtotal.toFixed(2)} + $${tipAmount.toFixed(2)} tip`
        })});
        if(!res.ok) throw new Error('Webhook error '+res.status);
        const data=await res.json();
        const url=data.url || data.checkout_url || data.payment_url;
        if(!url) throw new Error('No payment URL returned');
        window.location.href=url;
      } catch(err){ setLoading(false); showStatus('Payment error: '+err.message,'error'); }
    }

    function setLoading(on){ const btn=document.getElementById('pay-btn'); btn.disabled=on; }
    function showStatus(msg,type){ const el=document.getElementById('status-msg'); el.textContent=msg; el.className=`status-msg ${type}`; el.style.display='block'; }
    function hideStatus(){ const el=document.getElementById('status-msg'); el.style.display='none'; }
  </script>

</body>
</html>
