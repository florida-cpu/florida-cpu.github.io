<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add a Tip — Muscle For Hire Movers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #f4f6f9;
      --surface:  #fff;
      --border:   #e8ecf4;
      --accent:   #1a2b5e;
      --accent2:  #253f8a;
      --text:     #1a1a2e;
      --muted:    #6b7a99;
      --green:    #1a8c5b;
      --red:      #c0392b;
      --radius:   12px;
      --mono:     'Inter', monospace;
      --sans:     'Inter', sans-serif;
      --display:  'Inter', sans-serif;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 0 3rem;
    }

    /* HEADER */
    header {
      width: 100%;
      background: var(--accent);
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      margin-bottom: 1.75rem;
    }
    .logo-badge {
      width: 40px; height: 40px;
      background: #fff;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 700; color: var(--accent);
    }
    .logo-text { color: #fff; font-weight: 700; font-size: 1.1rem; letter-spacing: -0.01em; }
    .header-sub { font-size: 0.72rem; color: #8fa3d4; letter-spacing: 0.05em; text-transform: uppercase; }

    /* MAIN LAYOUT */
    main {
      flex: 1;
      display: flex;
      justify-content: center;
      width: 100%;
      padding: 1rem;
    }
    .container { width: 100%; max-width: 460px; }

    /* HERO AMOUNT */
    .hero {
      text-align: center;
      padding: 2rem 1.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 1rem;
    }
    .hero-eyebrow {
      font-size: 0.72rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }
    .hero-amount {
      font-family: var(--display);
      font-size: 3rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.1;
    }
    .hero-amount .dollar { font-size: 1.75rem; color: var(--muted); vertical-align: top; margin-top: 0.4rem; display: inline-block; }
    .hero-label { font-size: 0.82rem; color: var(--muted); margin-top: 0.5rem; }

    /* SECTION LABEL */
    .section-label {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }

    /* TIP GRID */
    .tip-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }
    .tip-btn {
      padding: 1rem 0.5rem;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }
    .tip-btn .pct {
      font-family: var(--display);
      font-size: 1.25rem;
      font-weight: 700;
      display: block; line-height: 1;
    }
    .tip-btn .amt {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--muted);
      display: block;
      margin-top: 0.25rem;
    }
    .tip-btn:hover { border-color: var(--accent); }
    .tip-btn.active {
      border-color: var(--accent);
      background: rgba(26,43,94,0.08);
    }
    .tip-btn.active .pct { color: var(--accent); }
    .tip-btn.active .amt { color: var(--accent); }

    .tip-row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    /* CUSTOM TIP */
    .custom-row {
      display: none;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .custom-row.visible { display: flex; }
    .custom-prefix { font-family: var(--mono); font-size: 1rem; color: var(--muted); flex-shrink: 0; }
    .custom-row input {
      flex: 1;
      background: var(--bg);
      border: 1.5px solid var(--accent);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--mono);
      font-size: 1rem;
      padding: 0.65rem 0.75rem;
      outline: none;
    }
    .custom-row input::placeholder { color: var(--muted); }

    /* TOTAL DISPLAY */
    .total-display {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1rem;
      margin-bottom: 1rem;
    }
    .total-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.25rem 0;
    }
    .total-row .lbl { font-size: 0.72rem; color: var(--muted); }
    .total-row .val { font-family: var(--mono); font-size: 0.82rem; color: var(--text); }
    .total-row.final {
      border-top: 2px solid var(--accent);
      margin-top: 0.5rem; padding-top: 0.5rem;
    }
    .total-row.final .lbl {
      font-family: var(--display);
      font-size: 1rem; font-weight: 700; color: var(--text);
      text-transform: uppercase;
    }
    .total-row.final .val {
      font-family: var(--display);
      font-size: 1.75rem; font-weight: 700; color: var(--green);
    }

    /* PAY BUTTON */
    .btn-pay {
      width: 100%;
      padding: 1rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: var(--display);
      font-size: 1.1rem; font-weight: 700;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      transition: background 0.15s, transform 0.12s, opacity 0.15s;
    }
    .btn-pay:hover:not(:disabled) { background: var(--accent2); transform: translateY(-1px); }
    .btn-pay:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-pay .spinner {
      width: 20px; height: 20px;
      border: 3px solid rgba(0,0,0,0.3);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .btn-pay.loading .spinner { display: block; }
    .btn-pay.loading .btn-label { display: none; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* STATUS */
    .status-msg {
      display: none;
      padding: 0.65rem 0.75rem;
      border-radius: var(--radius);
      font-size: 0.72rem;
      margin-top: 0.5rem;
      line-height: 1.4;
    }
    .status-msg.error {
      display: block;
      background: rgba(192,57,43,0.12);
      border: 1px solid var(--red);
      color: var(--red);
    }
    .status-msg.info {
      display: block;
      background: rgba(26,43,94,0.08);
      border: 1px solid var(--accent);
      color: var(--accent);
    }

    /* MISSING STATE */
    .missing-state {
      text-align: center;
      padding: 3rem 1rem;
    }
    .missing-state .icon { font-size: 2.5rem; margin-bottom: 1rem; }
    .missing-state h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; color: var(--text); }
    .missing-state p { font-size: 0.82rem; color: var(--muted); line-height: 1.6; }
    .missing-state a {
      display: inline-block; margin-top: 1rem;
      padding: 0.75rem 1.25rem;
      background: var(--accent); color: #fff;
      border-radius: var(--radius);
      font-weight: 700;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

<header>
  <div class="logo-badge">M</div>
  <div>
    <div class="logo-text">Muscle For Hire Movers</div>
    <div class="header-sub">Tip & Payment</div>
  </div>
</header>

<main>
  <div class="container">

    <div class="missing-state" id="missing-state" style="display:none;">
      <div class="icon">⚠️</div>
      <h2>No Subtotal Found</h2>
      <p>This page requires a subtotal in the URL.<br/>
         Please go back to the quote calculator and<br/>
         generate a fresh tip link.</p>
      <a href="index.html">← Back to Calculator</a>
    </div>

    <div id="tip-ui">

      <div class="hero">
        <div class="hero-eyebrow">Your Move Total</div>
        <div class="hero-amount">
          <span class="dollar">$</span><span id="subtotal-display">0</span>
        </div>
        <div class="hero-label">Before tip</div>
      </div>

      <div class="section-label">Choose a Tip</div>
      <div class="tip-grid">
        <button class="tip-btn" data-pct="20" onclick="selectTip(20)">
          <span class="pct">20%</span>
          <span class="amt" id="amt-20">$0.00</span>
        </button>
        <button class="tip-btn" data-pct="25" onclick="selectTip(25)">
          <span class="pct">25%</span>
          <span class="amt" id="amt-25">$0.00</span>
        </button>
        <button class="tip-btn" data-pct="30" onclick="selectTip(30)">
          <span class="pct">30%</span>
          <span class="amt" id="amt-30">$0.00</span>
        </button>
      </div>
      <div class="tip-row-2">
        <button class="tip-btn no-tip" data-pct="0" onclick="selectTip(0)">
          <span class="pct">No Tip</span>
          <span class="amt">$0.00</span>
        </button>
        <button class="tip-btn" data-pct="custom" onclick="selectCustom()">
          <span class="pct">Custom</span>
          <span class="amt">Enter amount</span>
        </button>
      </div>

      <div class="custom-row" id="custom-row">
        <span class="custom-prefix">$</span>
        <input type="number" id="custom-input" placeholder="0.00" min="0" step="0.01" oninput="updateCustom()" />
      </div>

      <div class="total-display">
        <div class="total-row">
          <span class="lbl">Move subtotal</span>
          <span class="val" id="total-subtotal">$0.00</span>
        </div>
        <div class="total-row">
          <span class="lbl" id="tip-label">Tip (0%)</span>
          <span class="val" id="tip-amount">$0.00</span>
        </div>
        <div class="total-row final">
          <span class="lbl">Total Due</span>
          <span class="val" id="final-total">$0.00</span>
        </div>
      </div>

      <button class="btn-pay" id="pay-btn" onclick="handlePay()">
        <span class="btn-label">💳 Pay Now</span>
        <div class="spinner"></div>
      </button>

      <div class="status-msg" id="status-msg"></div>
    </div>
  </div>
</main>

<script>
  const MAKE_WEBHOOK_URL = 'https://hook.us2.make.com/biwwpm5olme1grp5zauee0wcw5yx4ziv';

  let subtotal = 0;
  let tipAmount = 0;
  let tipMode = 'pct';
  let selectedPct = 20;

  (function init() {
    const params = new URLSearchParams(window.location.search);
    const raw = params.get('subtotal');

    if (!raw || isNaN(parseFloat(raw))) {
      document.getElementById('tip-ui').style.display = 'none';
      document.getElementById('missing-state').style.display = 'block';
      return;
    }

    subtotal = Math.max(0, parseFloat(raw));
    document.getElementById('subtotal-display').textContent = subtotal.toFixed(2);
    document.getElementById('total-subtotal').textContent = '$' + subtotal.toFixed(2);

    [20,25,30].forEach(p => {
      document.getElementById(`amt-${p}`).textContent =
        '$' + (subtotal * p / 100).toFixed(2);
    });

    selectTip(20);
  })();

  function selectTip(pct) {
    tipMode = pct === 0 ? 'none' : 'pct';
    selectedPct = pct;
    tipAmount = pct === 0 ? 0 : subtotal * pct / 100;

    document.querySelectorAll('.tip-btn').forEach(btn => {
      const d = btn.getAttribute('data-pct');
      btn.classList.toggle('active', pct === 0 ? d === '0' : d === String(pct));
    });

    document.getElementById('custom-row').classList.remove('visible');
    document.getElementById('custom-input').value = '';
    updateTotals();
  }

  function selectCustom() {
    tipMode = 'custom';
    document.querySelectorAll('.tip-btn').forEach(btn => {
      btn.classList.toggle('active', btn.getAttribute('data-pct') === 'custom');
    });
    document.getElementById('custom-row').classList.add('visible');
    document.getElementById('custom-input').focus();
    tipAmount = 0;
    updateTotals();
  }

  function updateCustom() {
    const v = parseFloat(document.getElementById('custom-input').value);
    tipAmount = isNaN(v) ? 0 : Math.max(0, v);
    updateTotals();
  }

  function updateTotals() {
    const total = subtotal + tipAmount;
    let tipLabelText = 'Tip';
    if (tipMode === 'pct' && selectedPct > 0) tipLabelText = `Tip (${selectedPct}%)`;
    else if (tipMode === 'none') tipLabelText = 'No tip';
    else if (tipMode === 'custom') tipLabelText = 'Custom tip';

    document.getElementById('tip-label').textContent = tipLabelText;
    document.getElementById('tip-amount').textContent = '$' + tipAmount.toFixed(2);
    document.getElementById('final-total').textContent = '$' + total.toFixed(2);
  }

  async function handlePay() {
    const total = subtotal + tipAmount;
    const totalCents = Math.round(total * 100);

    if (totalCents < 50) {
      showStatus('Minimum charge is $0.50. Please add a tip or return to the calculator.', 'error');
      return;
    }

    if (MAKE_WEBHOOK_URL.includes('YOUR_WEBHOOK_ID_HERE')) {
      showStatus('⚠️ Webhook not configured. Open tip.html and set MAKE_WEBHOOK_URL.', 'error');
      return;
    }

    setLoading(true);
    try {
      const resp = await fetch(MAKE_WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ subtotal, tip: tipAmount, total: total })
      });
      if (!resp.ok) throw new Error('Network response not OK');
      window.location.href = `https://buy.stripe.com/28E14n13F4jY0d0fZdfUQ1f?prefilled_total=${total.toFixed(2)}`;
    } catch (err) {
      showStatus('Error submitting payment: ' + err.message, 'error');
    } finally { setLoading(false); }
  }

  function setLoading(loading) {
    const btn = document.getElementById('pay-btn');
    btn.classList.toggle('loading', loading);
    btn.disabled = loading;
  }

  function showStatus(msg, type) {
    const s = document.getElementById('status-msg');
    s.textContent = msg;
    s.className = 'status-msg ' + type;
  }
</script>

</body>
</html>
