<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Muscle For Hire Movers — Add a Tip</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #f4f6f9;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 0 3rem;
    }

    /* HEADER */
    header {
      width: 100%;
      background: #1a2b5e;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }
    .header-icon {
      width: 40px; height: 40px;
      background: #fff;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .header-text { color: #fff; }
    .header-title { font-size: 1.1rem; font-weight: 700; }
    .header-sub { font-size: 0.72rem; color: #8fa3d4; letter-spacing: 0.05em; text-transform: uppercase; }

    /* LAYOUT */
    .container { width: 100%; max-width: 460px; }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 1.5rem;
      border: 1px solid #e8ecf4;
      margin-bottom: 1rem;
    }

    .section-label {
      font-size: 0.7rem;
      font-weight: 600;
      color: #1a2b5e;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }

    /* TIP BUTTON GRID */
    .tip-grid, .tip-row-2 {
      display: grid;
      gap: 10px;
      margin-bottom: 1rem;
    }
    .tip-grid { grid-template-columns: repeat(3, 1fr); }
    .tip-row-2 { grid-template-columns: 1fr 1fr; }

    .tip-btn {
      background: #f4f6f9;
      border: 1.5px solid #e8ecf4;
      border-radius: 12px;
      padding: 1rem;
      font-weight: 600;
      color: #1a2b5e;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      text-align: center;
    }
    .tip-btn:hover { background: #1a2b5e; color: #fff; border-color: #1a2b5e; }
    .tip-btn.active { background: #1a8c5b; color: #fff; border-color: #1a8c5b; }

    .tip-btn .pct { font-size: 1.25rem; display: block; margin-bottom: 0.25rem; }
    .tip-btn .amt { font-size: 0.85rem; display: block; }

    /* CUSTOM TIP INPUT */
    .custom-row { display: none; margin-bottom: 1rem; gap: 0.5rem; align-items: center; }
    .custom-row.visible { display: flex; }
    .custom-prefix { font-size: 0.9rem; color: #6b7a99; }
    .custom-row input {
      flex: 1;
      border-radius: 12px;
      border: 1.5px solid #e8ecf4;
      padding: 0.85rem 1rem;
      font-size: 1rem;
      font-weight: 500;
      background: #fff;
      color: #1a1a2e;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
    }
    .custom-row input:focus { border-color: #1a2b5e; }

    /* TOTAL DISPLAY */
    .total-display {
      background: #f4f6f9;
      border: 1px solid #e8ecf4;
      border-radius: 12px;
      padding: 1rem 1.1rem;
      margin-bottom: 1.25rem;
    }
    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 0;
    }
    .total-row.final {
      border-top: 2px solid #1a2b5e;
      margin-top: 0.5rem; padding-top: 0.5rem;
      font-weight: 700;
      font-size: 1.1rem;
    }
    .total-row .val { font-weight: 600; color: #1a2b5e; }

    /* PAY BUTTON */
    .btn-pay {
      width: 100%;
      padding: 1rem;
      background: #1a2b5e;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      display: flex; justify-content: center; align-items: center; gap: 0.5rem;
    }
    .btn-pay:hover { background: #253f8a; transform: scale(0.98); }
    .btn-pay:active { transform: scale(0.96); }
    .btn-pay:disabled { opacity: 0.6; cursor: not-allowed; }

    /* STATUS MESSAGE */
    .status-msg {
      display: none;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      font-size: 0.82rem;
      margin-top: 0.75rem;
    }
    .status-msg.error { display: block; background: #f8d7da; color: #c0392b; border: 1px solid #c0392b; }
    .status-msg.info { display: block; background: #d1f0e4; color: #1a8c5b; border: 1px solid #1a8c5b; }

    /* HERO / SUBTOTAL */
    .hero {
      background: #fff;
      border: 1px solid #e8ecf4;
      border-radius: 16px;
      padding: 1.5rem;
      text-align: center;
      margin-bottom: 1rem;
    }
    .hero-amount { font-size: 2rem; font-weight: 700; color: #1a2b5e; }
    .hero-label { font-size: 0.85rem; color: #6b7a99; margin-top: 0.25rem; }
  </style>
</head>
<body>

<header>
  <div class="header-icon">💪</div>
  <div class="header-text">
    <div class="header-title">Muscle For Hire Movers</div>
    <div class="header-sub">Tip & Payment</div>
  </div>
</header>

<div class="container">

  <!-- HERO -->
  <div class="hero">
    <div class="hero-label">Your Move Total</div>
    <div class="hero-amount" id="subtotal-display">$0.00</div>
  </div>

  <!-- TIP SELECTION -->
  <div class="section-label">Choose a Tip</div>
  <div class="tip-grid">
    <button class="tip-btn" data-pct="20" onclick="selectTip(20)">
      <span class="pct">20%</span>
      <span class="amt" id="amt-20">$0.00</span>
    </button>
    <button class="tip-btn" data-pct="25" onclick="selectTip(25)">
      <span class="pct">25%</span>
      <span class="amt" id="amt-25">$0.00</span>
    </button>
    <button class="tip-btn" data-pct="30" onclick="selectTip(30)">
      <span class="pct">30%</span>
      <span class="amt" id="amt-30">$0.00</span>
    </button>
  </div>

  <div class="tip-row-2">
    <button class="tip-btn no-tip" data-pct="0" onclick="selectTip(0)">
      <span class="pct">No Tip</span>
      <span class="amt">$0.00</span>
    </button>
    <button class="tip-btn" data-pct="custom" onclick="selectCustom()">
      <span class="pct">Custom</span>
      <span class="amt">Enter amount</span>
    </button>
  </div>

  <div class="custom-row" id="custom-row">
    <span class="custom-prefix">$</span>
    <input type="number" id="custom-input" placeholder="0.00" min="0" step="0.01" oninput="updateCustom()" />
  </div>

  <div class="total-display">
    <div class="total-row">
      <span class="lbl">Move subtotal</span>
      <span class="val" id="total-subtotal">$0.00</span>
    </div>
    <div class="total-row">
      <span class="lbl" id="tip-label">Tip (0%)</span>
      <span class="val" id="tip-amount">$0.00</span>
    </div>
    <div class="total-row final">
      <span class="lbl">Total Due</span>
      <span class="val" id="final-total">$0.00</span>
    </div>
  </div>

  <button class="btn-pay" id="pay-btn" onclick="handlePay()">💳 Pay Now</button>
  <div class="status-msg" id="status-msg"></div>
</div>

<script>
  /* Keep your previous JS logic exactly as before for selectTip, selectCustom, updateCustom, updateTotals, handlePay, etc. */
</script>

</body>
</html>
