<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add a Tip — Muscle For Hire Movers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f6f9;
      --surface: #fff;
      --border: #e8ecf4;
      --accent: #1a2b5e;
      --accent2: #253f8a;
      --text: #1a1a2e;
      --muted: #6b7a99;
      --green: #1a8c5b;
      --red: #c0392b;
      --radius: 12px;
      --mono: 'Inter', sans-serif;
      --sans: 'Inter', sans-serif;
      --display: 'Inter', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* HEADER */
    header {
      background: var(--accent);
      color: #fff;
      padding: 1.25rem 1.5rem;
      display: flex; align-items: center; gap: 0.75rem;
    }
    .logo-badge {
      width: 40px; height: 40px;
      background: #fff; color: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 700;
      flex-shrink: 0;
    }
    .logo-text { font-family: var(--display); font-size: 1.1rem; font-weight: 700; }
    .logo-text span { color: #fff; }
    .header-sub { font-size: 0.72rem; color: #8fa3d4; letter-spacing: 0.05em; text-transform: uppercase; }

    /* MAIN */
    main {
      flex: 1;
      display: flex; align-items: flex-start; justify-content: center;
      padding: 40px 16px 64px;
    }
    .container { width: 100%; max-width: 460px; }

    /* HERO AMOUNT */
    .hero {
      text-align: center;
      padding: 36px 24px 28px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 20px;
    }
    .hero-eyebrow {
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .hero-amount {
      font-family: var(--display);
      font-size: 2.5rem;
      font-weight: 700;
      line-height: 1;
      color: var(--text);
    }
    .hero-amount .dollar { font-size: 1.5rem; vertical-align: top; margin-top: 5px; display: inline-block; color: var(--muted); }
    .hero-label {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 8px;
    }

    /* SECTION LABEL */
    .section-label {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text);
      margin-bottom: 12px;
    }

    /* TIP GRID */
    .tip-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 10px;
    }
    .tip-btn {
      padding: 16px 8px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      cursor: pointer;
      transition: all 0.16s;
      text-align: center;
      font-family: var(--sans);
    }
    .tip-btn .pct {
      font-size: 1.5rem; font-weight: 600;
      display: block; line-height: 1;
    }
    .tip-btn .amt {
      font-size: 0.85rem; color: var(--muted);
      display: block; margin-top: 4px;
    }
    .tip-btn:hover { border-color: var(--accent2); }
    .tip-btn.active {
      border-color: var(--accent);
      background: #edf0f8;
    }
    .tip-btn.active .pct { color: var(--accent); }
    .tip-btn.active .amt { color: var(--accent); }

    .tip-row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }
    .tip-btn.no-tip .pct { font-size: 1.25rem; }

    /* CUSTOM TIP */
    .custom-row {
      display: none;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .custom-row.visible { display: flex; }
    .custom-prefix {
      font-size: 1rem;
      color: var(--muted);
      flex-shrink: 0;
    }
    .custom-row input {
      flex: 1;
      background: var(--bg);
      border: 1.5px solid var(--accent);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 1rem;
      padding: 0.85rem 1rem;
      outline: none;
    }
    .custom-row input::placeholder { color: var(--muted); }

    /* TOTAL DISPLAY */
    .total-display {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-bottom: 20px;
    }
    .total-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 5px 0;
    }
    .total-row .lbl { font-size: 0.8rem; color: var(--muted); }
    .total-row .val { font-size: 0.85rem; color: var(--text); }
    .total-row.final {
      border-top: 2px solid var(--accent);
      margin-top: 8px; padding-top: 14px;
    }
    .total-row.final .lbl {
      font-size: 1rem; font-weight: 700; color: var(--text);
    }
    .total-row.final .val {
      font-size: 1.8rem; font-weight: 700; color: var(--green);
    }

    /* PAY BUTTON */
    .btn-pay {
      width: 100%;
      padding: 1rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 1rem; font-weight: 700;
      cursor: pointer;
      transition: background 0.18s, transform 0.12s, opacity 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .btn-pay:hover:not(:disabled) { background: var(--accent2); transform: translateY(-1px); }
    .btn-pay:active:not(:disabled) { transform: translateY(0); }
    .btn-pay:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-pay .spinner {
      width: 20px; height: 20px;
      border: 3px solid rgba(0,0,0,0.2);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .btn-pay.loading .spinner { display: block; }
    .btn-pay.loading .btn-label { display: none; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* STATUS MESSAGES */
    .status-msg {
      display: none;
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 0.8rem;
      margin-top: 14px;
      line-height: 1.5;
    }
    .status-msg.error {
      display: block;
      background: rgba(192, 57, 43, 0.12);
      border: 1px solid var(--red);
      color: var(--red);
    }
    .status-msg.info {
      display: block;
      background: #edf0f8;
      border: 1px solid var(--accent);
      color: var(--accent);
    }

    /* MISSING SUBTOTAL */
    .missing-state {
      text-align: center;
      padding: 60px 24px;
    }
    .missing-state .icon { font-size: 52px; margin-bottom: 16px; }
    .missing-state h2 { font-size: 1.6rem; font-weight: 700; color: var(--text); margin-bottom: 10px; }
    .missing-state p { font-size: 0.85rem; color: var(--muted); line-height: 1.6; }
    .missing-state a {
      display: inline-block; margin-top: 20px;
      padding: 0.85rem 1.5rem;
      background: var(--accent);
      color: #fff;
      border-radius: var(--radius);
      font-size: 0.9rem; font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body>

<header>
  <div class="logo-badge">M</div>
  <div>
    <div class="logo-text">MUSCLE<span>FOR HIRE</span></div>
    <div class="header-sub">Tip & Payment</div>
  </div>
</header>

<main>
  <div class="container">
    <!-- Missing subtotal state -->
    <div class="missing-state" id="missing-state" style="display:none;">
      <div class="icon">⚠️</div>
      <h2>No Subtotal Found</h2>
      <p>This page requires a subtotal in the URL.<br/>
         Please go back to the quote calculator and<br/>
         generate a fresh tip link.</p>
      <a href="index.html">← Back to Calculator</a>
    </div>

    <!-- Tip UI -->
    <div id="tip-ui">
      <!-- Subtotal hero -->
      <div class="hero">
        <div class="hero-eyebrow">Your Move Total</div>
        <div class="hero-amount">
          <span class="dollar">$</span><span id="subtotal-display">0</span>
        </div>
        <div class="hero-label">Before tip</div>
      </div>

      <!-- Tip selection -->
      <div class="section-label">Choose a Tip</div>
      <div class="tip-grid">
        <button class="tip-btn" data-pct="20" onclick="selectTip(20)">
          <span class="pct">20%</span>
          <span class="amt" id="amt-20">$0.00</span>
        </button>
        <button class="tip-btn" data-pct="25" onclick="selectTip(25)">
          <span class="pct">25%</span>
          <span class="amt" id="amt-25">$0.00</span>
        </button>
        <button class="tip-btn" data-pct="30" onclick="selectTip(30)">
          <span class="pct">30%</span>
          <span class="amt" id="amt-30">$0.00</span>
        </button>
      </div>
      <div class="tip-row-2">
        <button class="tip-btn no-tip" data-pct="0" onclick="selectTip(0)">
          <span class="pct">No Tip</span>
          <span class="amt">$0.00</span>
        </button>
        <button class="tip-btn" data-pct="custom" onclick="selectCustom()">
          <span class="pct">Custom</span>
          <span class="amt">Enter amount</span>
        </button>
      </div>

      <!-- Custom input -->
      <div class="custom-row" id="custom-row">
        <span class="custom-prefix">$</span>
        <input type="number" id="custom-input" placeholder="0.00" min="0" step="0.01" oninput="updateCustom()" />
      </div>

      <!-- Total breakdown -->
      <div class="total-display">
        <div class="total-row">
          <span class="lbl">Move subtotal</span>
          <span class="val" id="total-subtotal">$0.00</span>
        </div>
        <div class="total-row">
          <span class="lbl" id="tip-label">Tip (0%)</span>
          <span class="val" id="tip-amount">$0.00</span>
        </div>
        <div class="total-row final">
          <span class="lbl">Total Due</span>
          <span class="val" id="final-total">$0.00</span>
        </div>
      </div>

      <!-- Pay button -->
      <button class="btn-pay" id="pay-btn" onclick="handlePay()">
        <span class="btn-label">💳 Pay Now</span>
        <div class="spinner"></div>
      </button>

      <!-- Status messages -->
      <div class="status-msg" id="status-msg"></div>

    </div><!-- /tip-ui -->
  </div>
</main>

<script>
  // ────────────── Original JS untouched ──────────────
  const MAKE_WEBHOOK_URL = 'https://hook.us2.make.com/biwwpm5olme1grp5zauee0wcw5yx4ziv';
  let subtotal = 0; let tipAmount = 0; let tipMode = 'pct'; let selectedPct = 20;

  (function init() {
    const params = new URLSearchParams(window.location.search);
    const raw = params.get('subtotal');
    if (!raw || isNaN(parseFloat(raw))) {
      document.getElementById('tip-ui').style.display = 'none';
      document.getElementById('missing-state').style.display = 'block';
      return;
    }
    subtotal = Math.max(0, parseFloat(raw));
    document.getElementById('subtotal-display').textContent = subtotal.toFixed(2);
    document.getElementById('total-subtotal').textContent = '$' + subtotal.toFixed(2);
    [20,25,30].forEach(p=>{
      document.getElementById(`amt-${p}`).textContent='$'+(subtotal*p/100).toFixed(2);
    });
    selectTip(20);
  })();

  function selectTip(pct){
    tipMode=pct===0?'none':'pct';
    selectedPct=pct;
    tipAmount=pct===0?0:subtotal*pct/100;
    document.querySelectorAll('.tip-btn').forEach(btn=>{
      const d=btn.getAttribute('data-pct');
      btn.classList.toggle('active',pct===0?d==='0':d===String(pct));
    });
    document.getElementById('custom-row').classList.remove('visible');
    document.getElementById('custom-input').value='';
    updateTotals();
  }
  function selectCustom(){
    tipMode='custom';
    document.querySelectorAll('.tip-btn').forEach(btn=>{
      btn.classList.toggle('active',btn.getAttribute('data-pct')==='custom');
    });
    document.getElementById('custom-row').classList.add('visible');
    document.getElementById('custom-input').focus();
    tipAmount=0;
    updateTotals();
  }
  function updateCustom(){
    const v=parseFloat(document.getElementById('custom-input').value);
    tipAmount=isNaN(v)?0:Math.max(0,v);
    updateTotals();
  }
  function updateTotals(){
    const total=subtotal+tipAmount;
    let tipLabelText='Tip';
    if(tipMode==='pct'&&selectedPct>0) tipLabelText=`Tip (${selectedPct}%)`;
    else if(tipMode==='none') tipLabelText='No tip';
    else if(tipMode==='custom') tipLabelText='Custom tip';
    document.getElementById('tip-label').textContent=tipLabelText;
    document.getElementById('tip-amount').textContent='$'+tipAmount.toFixed(2);
    document.getElementById('final-total').textContent='$'+total.toFixed(2);
  }
  async function handlePay(){
    const total=subtotal+tipAmount;
    const totalCents=Math.round(total*100);
    if(totalCents<50){ showStatus('Minimum charge is $0.50. Please add a tip or return to the calculator.','error'); return; }
    if(MAKE_WEBHOOK_URL.includes('YOUR_WEBHOOK_ID_HERE')){
      showStatus('⚠️ Webhook not configured. Open tip.html and set MAKE_WEBHOOK_URL to your Make.com webhook URL.','error');
      return;
    }
    setLoading(true); hideStatus();
    try{
      const response=await fetch(MAKE_WEBHOOK_URL,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          amount_cents:totalCents,
          subtotal_cents:Math.round(subtotal*100),
          tip_cents:Math.round(tipAmount*100),
          subtotal:subtotal.toFixed(2),
          tip:tipAmount.toFixed(2),
          total:total.toFixed(2)
        })
      });
      if(!response.ok) throw new Error(await response.text());
      window.location.href=`https://buy.stripe.com/28E14n13F4jY0d0fZdfUQ1f?prefilled_total=${total.toFixed(2)}`;
    }catch(e){ showStatus(e.message,'error'); setLoading(false); }
  }
  function setLoading(b){ const btn=document.getElementById('pay-btn'); btn.classList.toggle('loading',b); btn.disabled=b; }
  function showStatus(msg,type){ const s=document.getElementById('status-msg'); s.textContent=msg; s.className='status-msg '+type; s.style.display='block'; }
  function hideStatus(){ const s=document.getElementById('status-msg'); s.style.display='none'; }
</script>

</body>
</html>
